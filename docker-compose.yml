services:
  postgres-test:
    image: postgres:16
    profiles: ["postgres-test"]
    environment:
      POSTGRES_DB: texnik_test
      POSTGRES_USER: texnik
      POSTGRES_PASSWORD: texnik
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U texnik -d texnik_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - ./:/workspace
